<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase写入测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    button { padding: 15px 30px; margin: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button.success { background: #4caf50; }
    button.danger { background: #f44336; }
    .result { margin: 10px 0; padding: 15px; border-radius: 4px; }
    .success { background: #e8f5e8; color: green; }
    .error { background: #ffe8e8; color: red; }
    .info { background: #e8f0ff; color: blue; }
    .warning { background: #fff3e0; color: orange; }
    .code { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; margin: 10px 0; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="./config.js"></script>
</head>
<body>
  <h1>Firebase写入测试</h1>
  <button onclick="testBasicWrite()">测试基本写入</button>
  <button onclick="testGroupsWrite()">测试小组写入</button>
  <button onclick="forceAddUngrouped()" class="success">强制添加未分组组</button>
  <button onclick="resetAllData()" class="danger">重置所有数据</button>
  <div id="result"></div>

  <script>
    let db = null;

    // 初始化Firebase
    function initFirebase() {
      if (!db) {
        try {
          const app = firebase.initializeApp(window.firebaseConfig);
          db = firebase.database();
        } catch (error) {
          if (error.code === 'app/duplicate-app') {
            db = firebase.database();
          } else {
            throw error;
          }
        }
      }
      return db;
    }

    // 测试基本写入
    async function testBasicWrite() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在测试基本写入...</div>';
      
      try {
        initFirebase();
        
        const testData = { timestamp: Date.now(), test: true };
        
        // 写入测试数据
        await db.ref('test').set(testData);
        
        // 立即读取验证
        const snapshot = await db.ref('test').once('value');
        const readData = snapshot.val();
        
        // 清理测试数据
        await db.ref('test').remove();
        
        if (readData && readData.test === true) {
          resultDiv.innerHTML = '<div class="success">✅ 基本写入测试成功！数据可以正常写入和读取。</div>';
        } else {
          resultDiv.innerHTML = '<div class="error">❌ 基本写入测试失败！数据写入后读取不一致。</div>';
        }
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ 基本写入测试失败: ${error.message}</div>`;
      }
    }

    // 测试小组写入
    async function testGroupsWrite() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在测试小组写入...</div>';
      
      try {
        initFirebase();
        
        // 先读取当前数据
        const groupsSnapshot = await db.ref('groups').once('value');
        const currentGroups = groupsSnapshot.exists() ? groupsSnapshot.val() : {};
        
        // 尝试写入测试小组
        const testGroupName = '测试组' + Date.now();
        await db.ref(`groups/${testGroupName}`).set(['测试成员1', '测试成员2']);
        
        // 等待写入完成
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // 验证写入结果
        const newGroupsSnapshot = await db.ref('groups').once('value');
        const newGroups = newGroupsSnapshot.exists() ? newGroupsSnapshot.val() : {};
        
        // 清理测试数据
        await db.ref(`groups/${testGroupName}`).remove();
        
        const originalCount = Object.keys(currentGroups).length;
        const newCount = Object.keys(newGroups).length;
        
        if (newCount > originalCount) {
          resultDiv.innerHTML = `
            <div class="success">
              ✅ 小组写入测试成功！<br>
              写入前小组数: ${originalCount}<br>
              写入后小组数: ${newCount}<br>
              测试小组已清理
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="error">
              ❌ 小组写入测试失败！<br>
              写入前小组数: ${originalCount}<br>
              写入后小组数: ${newCount}<br>
              数据没有真正写入
            </div>
          `;
        }
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ 小组写入测试失败: ${error.message}</div>`;
      }
    }

    // 强制添加未分组组
    async function forceAddUngrouped() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在强制添加未分组组...</div>';
      
      try {
        initFirebase();
        
        // 先读取当前数据
        const groupsSnapshot = await db.ref('groups').once('value');
        const groupNamesSnapshot = await db.ref('groupNames').once('value');
        
        const currentGroups = groupsSnapshot.exists() ? groupsSnapshot.val() : {};
        const currentGroupNames = groupNamesSnapshot.exists() ? groupNamesSnapshot.val() : {};
        
        console.log('当前小组:', Object.keys(currentGroups));
        console.log('当前小组名称映射:', Object.keys(currentGroupNames));
        
        // 方法1: 直接设置
        await db.ref('groups/未分组').set([]);
        await db.ref('groupNames/未分组').set("未分组");
        
        // 等待写入完成
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // 验证结果
        const newGroupsSnapshot = await db.ref('groups').once('value');
        const newGroupNamesSnapshot = await db.ref('groupNames').once('value');
        
        const newGroups = newGroupsSnapshot.exists() ? newGroupsSnapshot.val() : {};
        const newGroupNames = newGroupNamesSnapshot.exists() ? newGroupNamesSnapshot.val() : {};
        
        console.log('新小组:', Object.keys(newGroups));
        console.log('新小组名称映射:', Object.keys(newGroupNames));
        
        const hasUngroupedGroup = newGroups["未分组"] !== undefined;
        const hasUngroupedMapping = newGroupNames["未分组"] !== undefined;
        const groupCountIncreased = Object.keys(newGroups).length > Object.keys(currentGroups).length;
        
        if (hasUngroupedGroup && hasUngroupedMapping && groupCountIncreased) {
          resultDiv.innerHTML = `
            <div class="success">
              ✅ 未分组组添加成功！<br>
              添加前小组数: ${Object.keys(currentGroups).length}<br>
              添加后小组数: ${Object.keys(newGroups).length}<br>
              未分组组存在: ${hasUngroupedGroup ? '是' : '否'}<br>
              未分组映射存在: ${hasUngroupedMapping ? '是' : '否'}<br>
              所有小组: ${Object.keys(newGroups).join(', ')}
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="error">
              ❌ 未分组组添加失败！<br>
              添加前小组数: ${Object.keys(currentGroups).length}<br>
              添加后小组数: ${Object.keys(newGroups).length}<br>
              未分组组存在: ${hasUngroupedGroup ? '是' : '否'}<br>
              未分组映射存在: ${hasUngroupedMapping ? '是' : '否'}<br>
              所有小组: ${Object.keys(newGroups).join(', ')}<br>
              <div class="warning">
                可能的原因：<br>
                1. Firebase权限问题<br>
                2. 数据写入延迟<br>
                3. 网络连接问题<br>
                4. Firebase服务问题
              </div>
            </div>
          `;
        }
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ 强制添加失败: ${error.message}</div>`;
      }
    }

    // 重置所有数据
    async function resetAllData() {
      if (!confirm('确定要重置所有数据吗？这将删除所有现有数据！')) {
        return;
      }
      
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在重置所有数据...</div>';
      
      try {
        initFirebase();
        
        if (window.sampleData) {
          // 使用示例数据重置
          await db.ref('groups').set(window.sampleData.groups);
          await db.ref('groupNames').set(window.sampleData.groupNames);
          await db.ref('attendanceRecords').set([]);
          
          // 验证重置结果
          const groupsSnapshot = await db.ref('groups').once('value');
          const groups = groupsSnapshot.exists() ? groupsSnapshot.val() : {};
          
          resultDiv.innerHTML = `
            <div class="success">
              ✅ 数据重置成功！<br>
              小组数量: ${Object.keys(groups).length}<br>
              包含未分组组: ${groups["未分组"] ? '是' : '否'}<br>
              所有小组: ${Object.keys(groups).join(', ')}
            </div>
          `;
        } else {
          throw new Error('示例数据未加载');
        }
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ 重置失败: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
