<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSH签到汇总</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <h1>MSH签到汇总</h1>
  <div class="button-row">
    <button id="backButton">返回管理页面</button>
    <button id="backToSigninButton">返回签到页面</button>
    <button id="clearRecordsButton">清空签到记录</button>
    <button id="exportButton">导出记录</button>
  </div>
  <div class="report-selection">
    <label for="reportType">选择报告类型：</label>
    <select id="reportType">
      <option value="records">签到记录</option>
      <option value="quarterly">季度报告</option>
      <option value="yearly">年度报告</option>
    </select>
    <label for="reportPeriod" id="periodLabel" style="display: none;">选择周期：</label>
    <select id="reportPeriod" style="display: none;"></select>
  </div>
  <h2 id="reportTitle">签到记录</h2>
  <table id="summaryTable" class="attendance-table">
    <thead id="tableHead"></thead>
    <tbody id="summaryList"></tbody>
  </table>
  <script type="module" src="./src/summary.js"></script>
</body>
</html>
