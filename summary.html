<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSH签到系统-汇总</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <h1>签到汇总</h1>
    
    <div class="button-row">
        <button id="showAttendanceButton">签到记录</button>
        <button id="dailyReportButton">日报表</button>
        <button id="quarterlyReportButton">季度报表</button>
        <button id="yearlyReportButton">年度报表</button>
        <button id="backButton">返回管理员页面</button>
    </div>

    <div id="reportContainer">
        <table id="summaryTable" style="display: none;">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>组别</th>
                    <th>姓名</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody id="summaryList">
            </tbody>
        </table>

        <div id="dailyReportSection" style="display: none;">
            <h2>日报表</h2>
            <div id="reportDate"></div>
            <label for="dailyDate">选择日期：</label>
            <input type="date" id="dailyDate" value="">
            <button id="generateDailyReport">生成日报表</button>
            <button id="exportDailyReport" style="display: none;">导出 Excel</button>
            <table id="dailyReportTable">
                <thead>
                    <tr>
                        <th>组别</th>
                        <th>早到</th>
                        <th>准时</th>
                        <th>迟到</th>
                        <th>未签到</th>
                    </tr>
                </thead>
                <tbody id="dailyReportList">
                </tbody>
            </table>
        </div>

        <div id="quarterlyReportSection" style="display: none;">
            <h2>季度报表</h2>
            <label for="quarterlyYear">选择年份：</label>
            <select id="quarterlyYear">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <!-- 可根据需要添加更多年份 -->
            </select>
            <label for="quarterlyQuarter">选择季度：</label>
            <select id="quarterlyQuarter">
                <option value="1">第一季度</option>
                <option value="2">第二季度</option>
                <option value="3">第三季度</option>
                <option value="4">第四季度</option>
            </select>
            <button id="generateQuarterlyReport">生成季度报表</button>
            <button id="exportQuarterlyReport" style="display: none;">导出 Excel</button>
            <table id="quarterlyReportTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>组别</th>
                        <th>姓名</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="quarterlyReportList">
                </tbody>
            </table>
        </div>

        <div id="yearlyReportSection" style="display: none;">
            <h2>年度报表</h2>
            <label for="yearlyYear">选择年份：</label>
            <select id="yearlyYear">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <!-- 可根据需要添加更多年份 -->
            </select>
            <button id="generateYearlyReport">生成年度报表</button>
            <button id="exportYearlyReport" style="display: none;">导出 Excel</button>
            <button id="clearYearlyRecords" style="display: none;">清空签到记录</button>
            <table id="yearlyReportTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>组别</th>
                        <th>姓名</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="yearlyReportList">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

        storageBucket: "yjys-4102e.firebaseapp.com",
        messagingSenderId: "690578220792",

      };
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
    </script>
    <script src="./src/summary.js"></script>

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./src/service-worker.js')
          .then(registration => console.log('Service Worker registered.'))
          .catch(error => console.log('Service Worker registration failed:', error));
      }
    </script>
</body>
</html>
