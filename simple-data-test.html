<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单数据测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .result { margin: 10px 0; padding: 10px; border-radius: 4px; }
    .success { background-color: #e8f5e8; color: green; }
    .error { background-color: #ffe8e8; color: red; }
    .info { background-color: #e8f0ff; color: blue; }
    button { padding: 10px 20px; margin: 5px; }
  </style>
  <script src="./config.js"></script>
</head>
<body>
  <h1>简单数据测试</h1>
  <button onclick="testConfig()">测试配置文件</button>
  <button onclick="testLocalStorage()">测试本地存储</button>
  <button onclick="testFirebase()">测试Firebase</button>
  <button onclick="fixData()">修复数据</button>
  
  <div id="result"></div>

  <script>
    function log(message, type = 'info') {
      const resultDiv = document.getElementById('result');
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.textContent = message;
      resultDiv.appendChild(div);
      console.log(message);
    }

    function testConfig() {
      log('=== 测试配置文件 ===');
      
      if (window.sampleData) {
        log('✅ 配置文件加载成功', 'success');
        
        const groups = window.sampleData.groups;
        const groupNames = window.sampleData.groupNames;
        
        log(`小组数量: ${Object.keys(groups).length}`, 'info');
        log(`小组名称映射数量: ${Object.keys(groupNames).length}`, 'info');
        
        // 检查"未分组"组
        if (groups["未分组"]) {
          log('✅ 配置中有"未分组"组', 'success');
          log(`未分组成员数量: ${groups["未分组"].length}`, 'info');
        } else {
          log('❌ 配置中没有"未分组"组', 'error');
        }
        
        // 检查"未分组"映射
        if (groupNames["未分组"]) {
          log(`✅ 配置中有"未分组"映射: "${groupNames["未分组"]}"`, 'success');
        } else {
          log('❌ 配置中没有"未分组"映射', 'error');
        }
        
        log(`所有小组: ${Object.keys(groups).join(', ')}`, 'info');
        
      } else {
        log('❌ 配置文件未加载', 'error');
      }
    }

    function testLocalStorage() {
      log('=== 测试本地存储 ===');
      
      const localGroups = localStorage.getItem('msh_groups');
      const localGroupNames = localStorage.getItem('msh_groupNames');
      
      if (localGroups) {
        const groups = JSON.parse(localGroups);
        log('✅ 本地存储中有groups数据', 'success');
        log(`本地小组数量: ${Object.keys(groups).length}`, 'info');
        
        if (groups["未分组"]) {
          log('✅ 本地存储中有"未分组"组', 'success');
          log(`未分组成员数量: ${groups["未分组"].length}`, 'info');
        } else {
          log('❌ 本地存储中没有"未分组"组', 'error');
        }
        
        log(`本地小组: ${Object.keys(groups).join(', ')}`, 'info');
      } else {
        log('⚠️ 本地存储中没有groups数据', 'error');
      }
      
      if (localGroupNames) {
        const groupNames = JSON.parse(localGroupNames);
        log('✅ 本地存储中有groupNames数据', 'success');
        log(`本地小组名称映射数量: ${Object.keys(groupNames).length}`, 'info');
        
        if (groupNames["未分组"]) {
          log(`✅ 本地groupNames中有"未分组"映射: "${groupNames["未分组"]}"`, 'success');
        } else {
          log('❌ 本地groupNames中没有"未分组"映射', 'error');
        }
      } else {
        log('⚠️ 本地存储中没有groupNames数据', 'error');
      }
    }

    async function testFirebase() {
      log('=== 测试Firebase ===');
      
      try {
        // 动态加载Firebase SDK
        if (typeof firebase === 'undefined') {
          log('正在加载Firebase SDK...', 'info');
          
          const script1 = document.createElement('script');
          script1.src = 'https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js';
          await new Promise((resolve) => {
            script1.onload = resolve;
            document.head.appendChild(script1);
          });
          
          const script2 = document.createElement('script');
          script2.src = 'https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js';
          await new Promise((resolve) => {
            script2.onload = resolve;
            document.head.appendChild(script2);
          });
        }
        
        // 初始化Firebase
        const app = firebase.initializeApp(window.firebaseConfig);
        const database = firebase.database();
        
        log('✅ Firebase初始化成功', 'success');
        
        // 检查groups数据
        const groupsSnapshot = await database.ref('groups').once('value');
        if (groupsSnapshot.exists()) {
          const groups = groupsSnapshot.val();
          log('✅ Firebase中有groups数据', 'success');
          log(`Firebase小组数量: ${Object.keys(groups).length}`, 'info');
          
          if (groups["未分组"]) {
            log('✅ Firebase中有"未分组"组', 'success');
            log(`未分组成员数量: ${groups["未分组"].length}`, 'info');
          } else {
            log('❌ Firebase中没有"未分组"组', 'error');
          }
          
          log(`Firebase小组: ${Object.keys(groups).join(', ')}`, 'info');
        } else {
          log('❌ Firebase中没有groups数据', 'error');
        }
        
        // 检查groupNames数据
        const groupNamesSnapshot = await database.ref('groupNames').once('value');
        if (groupNamesSnapshot.exists()) {
          const groupNames = groupNamesSnapshot.val();
          log('✅ Firebase中有groupNames数据', 'success');
          log(`Firebase小组名称映射数量: ${Object.keys(groupNames).length}`, 'info');
          
          if (groupNames["未分组"]) {
            log(`✅ Firebase groupNames中有"未分组"映射: "${groupNames["未分组"]}"`, 'success');
          } else {
            log('❌ Firebase groupNames中没有"未分组"映射', 'error');
          }
        } else {
          log('❌ Firebase中没有groupNames数据', 'error');
        }
        
      } catch (error) {
        log(`❌ Firebase测试失败: ${error.message}`, 'error');
      }
    }

    async function fixData() {
      log('=== 修复数据 ===');
      
      try {
        // 确保配置文件数据正确
        if (!window.sampleData) {
          log('❌ 配置文件未加载，无法修复', 'error');
          return;
        }
        
        const configGroups = window.sampleData.groups;
        const configGroupNames = window.sampleData.groupNames;
        
        // 确保有"未分组"组
        if (!configGroups["未分组"]) {
          configGroups["未分组"] = [];
          log('✅ 在配置中添加了"未分组"组', 'success');
        }
        
        // 确保有"未分组"映射
        if (!configGroupNames["未分组"]) {
          configGroupNames["未分组"] = "未分组";
          log('✅ 在配置中添加了"未分组"映射', 'success');
        }
        
        // 更新本地存储
        localStorage.setItem('msh_groups', JSON.stringify(configGroups));
        localStorage.setItem('msh_groupNames', JSON.stringify(configGroupNames));
        log('✅ 本地存储已更新', 'success');
        
        // 尝试更新Firebase
        try {
          if (typeof firebase !== 'undefined') {
            const database = firebase.database();
            await database.ref('groups').update({ "未分组": configGroups["未分组"] });
            await database.ref('groupNames').update({ "未分组": configGroupNames["未分组"] });
            log('✅ Firebase数据已更新', 'success');
          }
        } catch (firebaseError) {
          log(`⚠️ Firebase更新失败: ${firebaseError.message}`, 'error');
        }
        
        log('✅ 数据修复完成', 'success');
        
      } catch (error) {
        log(`❌ 修复失败: ${error.message}`, 'error');
      }
    }

    // 页面加载时自动测试配置
    document.addEventListener('DOMContentLoaded', () => {
      testConfig();
    });
  </script>
</body>
</html>
