<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单Firebase测试</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    button { padding: 15px 30px; margin: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .result { margin: 10px 0; padding: 15px; border-radius: 4px; }
    .success { background: #e8f5e8; color: green; }
    .error { background: #ffe8e8; color: red; }
    .info { background: #e8f0ff; color: blue; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="./config.js"></script>
</head>
<body>
  <h1>简单Firebase测试</h1>
  <button onclick="testFirebase()">测试Firebase</button>
  <button onclick="addUngrouped()">添加未分组组</button>
  <div id="result"></div>

  <script>
    let db = null;

    // 初始化Firebase（避免重复初始化）
    function initFirebase() {
      if (!db) {
        try {
          const app = firebase.initializeApp(window.firebaseConfig);
          db = firebase.database();
        } catch (error) {
          if (error.code === 'app/duplicate-app') {
            // 应用已存在，获取现有应用
            db = firebase.database();
          } else {
            throw error;
          }
        }
      }
      return db;
    }

    async function testFirebase() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在测试Firebase...</div>';
      
      try {
        // 初始化Firebase
        initFirebase();
        
        // 测试基本操作
        await db.ref('test').set({ timestamp: Date.now() });
        const snapshot = await db.ref('test').once('value');
        await db.ref('test').remove();
        
        resultDiv.innerHTML = '<div class="success">✅ Firebase测试成功！可以正常读写数据。</div>';
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ Firebase测试失败: ${error.message}</div>`;
      }
    }

    async function addUngrouped() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="info">正在添加未分组组...</div>';
      
      try {
        // 初始化Firebase
        initFirebase();
        
        // 先检查当前数据状态
        const groupsSnapshot = await db.ref('groups').once('value');
        const currentGroups = groupsSnapshot.exists() ? groupsSnapshot.val() : {};
        
        console.log('添加前的小组:', Object.keys(currentGroups));
        
        // 尝试添加未分组组
        await db.ref('groups/未分组').set([]);
        await db.ref('groupNames/未分组').set("未分组");
        
        // 等待一下确保数据写入
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // 验证添加结果
        const newGroupsSnapshot = await db.ref('groups').once('value');
        const newGroups = newGroupsSnapshot.exists() ? newGroupsSnapshot.val() : {};
        
        console.log('添加后的小组:', Object.keys(newGroups));
        
        // 检查是否真的添加成功
        const hasUngrouped = newGroups["未分组"] !== undefined;
        const groupCount = Object.keys(newGroups).length;
        
        if (hasUngrouped && groupCount > Object.keys(currentGroups).length) {
          resultDiv.innerHTML = `
            <div class="success">
              ✅ 未分组组添加成功！<br>
              添加前小组数: ${Object.keys(currentGroups).length}<br>
              添加后小组数: ${groupCount}<br>
              所有小组: ${Object.keys(newGroups).join(', ')}
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="error">
              ❌ 添加失败！<br>
              添加前小组数: ${Object.keys(currentGroups).length}<br>
              添加后小组数: ${groupCount}<br>
              未分组组存在: ${hasUngrouped ? '是' : '否'}<br>
              所有小组: ${Object.keys(newGroups).join(', ')}
            </div>
          `;
        }
        
      } catch (error) {
        resultDiv.innerHTML = `<div class="error">❌ 添加失败: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
